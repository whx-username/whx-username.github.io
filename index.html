<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC 最小通信 Demo</title>
</head>
<body>
  <h1>WebRTC 内网 C++ Agent 测试</h1>
  <p>手工交换 SDP，测试浏览器与内网 Agent 的 DataChannel 通信。</p>

  <h2>1. 创建 Offer</h2>
  <button id="create-offer">创建 Offer</button>
  <button id="copy-offer">复制 Offer</button>
  <p>将 Offer 完整复制到 Agent，最后输入 END。</p>
  <textarea id="offer" rows="12" cols="100" readonly></textarea>

  <h2>2. 应用 Agent Answer</h2>
  <p>将 Agent 输出的 Answer 完整粘贴到下面。</p>
  <textarea id="answer" rows="12" cols="100" placeholder="粘贴 Agent Answer"></textarea><br>
  <button id="apply-answer">应用 Answer</button>

  <h2>3. 连接状态</h2>
  <p>PeerConnection：<strong id="status">未连接</strong></p>
  <p>DataChannel：<strong id="channel-state">未建立</strong></p>

  <h2>4. 测试消息</h2>
  <button data-message="ping">发送 ping</button>
  <button data-message="hello agent">发送 hello</button>
  <input id="message" value="hello agent" aria-label="消息内容">
  <button id="send">发送</button>
  <button id="clear-log">清空日志</button>
  <pre id="log">等待 WebRTC DataChannel...</pre>

  <script src="./app.js"></script>
</body>
</html>
